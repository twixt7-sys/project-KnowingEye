name: Deploy Project OS

on:
  push:
    branches: [main]
    paths:
      - 'docs-new/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate seed + config JSON
        run: |
          for f in docs-new/os/data/seed/*.json docs-new/os/config/*.json docs-new/os/data/schema/*.json; do
            echo "Validating $f"
            python -m json.tool "$f" > /dev/null
          done

  deploy:
    needs: validate
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: 'docs-new'
      - id: deployment
        uses: actions/deploy-pages@v4
