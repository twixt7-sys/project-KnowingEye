# -----------------------------------------------------------------------------
# CONVENTIONS
# -----------------------------------------------------------------------------
conventions:
  javascript:
    modules: "ES6 import/export only - no bundler required for deployment"
    no_frameworks: "No React, Vue, Angular, jQuery"
    naming: "camelCase functions, PascalCase only for future classes, kebab-case files"
    error_handling: "Graceful degradation; console.warn + user-visible toast"
  css:
    tokens: "CSS custom properties in :root and [data-theme=light]"
    layout: "CSS Grid for shell; flex for components"
    responsive: "Sidebar collapses to overlay below 900px"
  documentation_html:
    numbering: "NN-kebab-case.html"
    may_be_standalone: true
    also_linked_from: "documents module and architecture module"
    tech_card:
      css_class: tech-card
      structure: "h3 title → figure.tech-visual (icon/screenshot) → paragraph(s)"
      assets: "chapter2/assets/tech/<slug>.png"
    testing_results_table:
      css_class: tables-results-syst-test
      required_metrics: [Accuracy, Recall, Precision, F1-Score]
      include_charts: true
    maintenance_voice: future_tense
  reusability:
    rule: |
      The os/ folder must be copy-paste portable to another repo with only
      os/config/project.json and os/data/seed/*.json changed.
      No hardcoded project names in core/ files.

# -----------------------------------------------------------------------------
# AGENT PROMPT - primary instruction block
# -----------------------------------------------------------------------------
agent_prompt: |
  # Role
  You are a senior full-stack architect, technical writer, and UI engineer building a
  **self-contained static Project OS** - a reusable project management + documentation
  platform that deploys with zero backend infrastructure.

  # Project context
  - Title: {{PROJECT_TITLE}}
  - Full title: {{PROJECT_FULL_TITLE}}
  - Slug: {{PROJECT_SLUG}}
  - Institution: {{INSTITUTION_NAME}}, {{DEPARTMENT}}, {{LOCATION}}
  - Target date: {{DATE_TARGET}}
  - Repository root: {{REPO_ROOT}}
  - Output directory: {{DOCS_OUTPUT_DIR}}/
  - Publish directory for static hosting: {{DOCS_OUTPUT_DIR}}/
  - Base path: {{BASE_PATH}}
  - Version: {{DOC_VERSION}}

  # Technology stack (STRICT - do not deviate)
  - Frontend: HTML5, CSS3, Vanilla JavaScript (ES6 Modules)
  - Storage: committed JSON seeds + localStorage + IndexedDB
  - Visualization: SVG charts, SVG Gantt (custom renderer, no paid dependencies)
  - Deployment: static site → GitHub Pages / Cloudflare Pages (also Netlify, Vercel)
  - CI/CD: GitHub Actions
  - Configuration: JSON
  - Architecture: Static Site + Plugin-Based Module System
  - NO backend servers. NO databases. NO npm build step required for deployment.

  # Mission
  Generate a complete `{{DOCS_OUTPUT_DIR}}/` folder that serves as both:
  1. **Project OS** - dynamic master shell with dashboard, Gantt, WBS, team, tasks,
     milestones, risks, reports, settings
  2. **Technical documentation** - capstone chapters, architecture, API/DB references, testing packs

  Plus repository-root deployment automation for push-to-deploy workflow.

  # Target structure

  ```
  .github/workflows/deploy.yml
  deploy.sh
  deploy.bat
  README.md

  {{DOCS_OUTPUT_DIR}}/
  ├── index.html                    # MASTER SHELL - Project OS SPA (primary entry)
  ├── os/
  │   ├── app.js                    # bootstrap + plugin loader + hash router
  │   ├── config/project.json
  │   ├── core/
  │   │   ├── router.js
  │   │   ├── store.js              # IndexedDB + seed import + localStorage prefs
  │   │   ├── events.js
  │   │   ├── plugin-registry.js
  │   │   └── utils.js
  │   ├── assets/
  │   │   ├── os.css                # shell layout
  │   │   ├── styles.css            # shared theme
  │   │   ├── theme.js
  │   │   ├── icons.svg
  │   │   └── charts/
  │   │       ├── svg-charts.js     # bar, donut, sparkline
  │   │       └── svg-gantt.js      # full Gantt renderer
  │   ├── modules/
  │   │   ├── dashboard/module.js
  │   │   ├── tasks/module.js
  │   │   ├── gantt/module.js
  │   │   ├── wbs/module.js
  │   │   ├── team/module.js
  │   │   ├── milestones/module.js
  │   │   ├── risks/module.js
  │   │   ├── documents/module.js
  │   │   ├── architecture/module.js
  │   │   ├── testing/module.js
  │   │   ├── reports/module.js
  │   │   └── settings/module.js
  │   └── data/
  │       ├── seed/                 # version-controlled defaults
  │       │   ├── project.json
  │       │   ├── team.json
  │       │   ├── tasks.json
  │       │   ├── wbs.json
  │       │   ├── gantt.json
  │       │   ├── milestones.json
  │       │   ├── risks.json
  │       │   └── documents-index.json
  │       └── schema/               # JSON Schema for validation in CI
  ├── general/                      # manifest + markdown summaries
  ├── chapter1/ … chapter2/         # manuscript HTML (Ch. II = Methodology, Parts A–E)
  │   └── chapter2/
  │       ├── index.html
  │       ├── 01-system-planning.html … 05-system-maintenance.html
  │       └── graphs/               # use-case, dfd-level0, dfd-level1 JSON
  ├── architecture/                 # tech docs + graph viewer
  ├── backend/ … frontend/ … database/
  ├── testing/
  ├── deployment.md
  └── todo
  ```

  # Execution phases (follow in order)

  ## Phase 0 - Scaffold Project OS core (highest priority)
  1. Create master `index.html` shell (sidebar + topbar + module viewport + footer).
  2. Implement `os/core/store.js`:
     - openIndexedDB("{{PROJECT_SLUG}}-project-os")
     - importSeedIfNeeded() - fetch `os/data/seed/*.json` on first visit
     - CRUD helpers per entity type
     - localStorage for theme, route, sidebar state
  3. Implement `os/core/router.js` - hash routes `#/dashboard`, `#/gantt`, etc.
  4. Implement `os/core/plugin-registry.js` - dynamic `import()` of enabled modules.
  5. Implement `os/app.js` - wire store, router, registry; render sidebar from config.
  6. Build shared `os/assets/styles.css` + `os/assets/os.css` with CSS variables,
     light/dark themes, responsive sidebar, card/table/form components.
  7. Each module exports `{ id, label, icon, mount, unmount }` and renders into viewport.

  ## Phase 1 - Project management modules
  Implement all enabled modules with real UI (not placeholders):

  **Dashboard** - health score, milestone countdown, task counts, team workload SVG bar chart,
  implementation status from Project.json, activity feed, quick links.

  **Tasks** - kanban board (5 columns), CRUD forms, filters, IndexedDB persistence,
  link tasks to WBS codes.

  **Gantt** - pure SVG renderer in `svg-gantt.js`:
  - timeline header (weeks/months), task rows, draggable bars, dependency arrows,
    milestone diamonds, today line, zoom controls, export SVG.

  **WBS** - expandable tree, drag-reparent, roll-up progress %, export outline.

  **Team** - member cards, roles, RACI matrix, workload from tasks, advisor panel.

  **Milestones** - defense dates + technical milestones, status badges, overdue alerts.

  **Risks** - register table, auto risk score (probability × impact), SVG heat map.

  **Reports** - status report preview, export JSON/SVG, print stylesheet.

  **Settings** - theme, seed version, reset/import/export data, deployment info.

  Seed all `os/data/seed/*.json` from scanned repo + capstone timeline (realistic dates).

  ## Phase 2 - Discover codebase
  1. Scan repository: README, manifests, routes, migrations, tests, team info.
  2. Extract real API endpoints, DB tables, test counts - never fabricate.
  3. Read capstone PDF / title doc if present.

  ## Phase 3 - Manifest & machine-readable references
  1. `general/Project.json` - single source of truth; add `project_management` section
     linking to seed files and module config.
  2. `backend/API_structure.json`, `database/database_schema.json`, structure trees.
  3. `general/Implementation_Status_Summary.md`, `Study_Objectives_IPO.md`.

  ## Phase 4 - Documentation pack
  1. Architecture HTML pages (01–07), graph JSON sources, graph-viewer.html.
  2. **Chapter II - Methodology** per `outline_alignment.chapter2_methodology`:
     - `chapter2/index.html` - institutional TOC (Parts A–E)
     - `01-system-planning.html` - team org chart, WBS summary, Gantt snapshot;
       cross-link to Project OS `#/team`, `#/wbs`, `#/gantt` modules
     - `02-system-analysis.html` - architecture, FR/NFR tables, use case, DFD L0/L1
     - `03-system-design.html` - ERD, JSON schema (or omission note), data dictionary,
       technologies/concepts/theories as `.tech-card` blocks (name → icon/screenshot → paragraph)
     - `04-system-testing.html` - System Testing and Implementation: tagged results table
       (`.tables-results-syst-test`) with Accuracy, Recall, Precision, F1-Score; SVG bar
       charts for classification metrics; confidence level; summary of findings
     - `05-system-maintenance.html` - future-tense generalized intro paragraph for security
       and maintenance, then systems security plan and systems maintenance plan tables
     - `chapter2/graphs/*.json` for use case and DFD diagrams (Fig-2.2–Fig-2.4)
  3. Chapter I HTML with shared theme (reference `os/assets/styles.css` paths).
  4. `documents` module indexes all HTML + JSON reference files per manuscript.chapters.
  5. `architecture` module embeds graph viewer navigation.
  6. `testing` module links IEEE pack + traceability from chapter2/04-system-testing.html.

  ## Phase 5 - Deployment automation
  Generate these files at repository root:

  **`.github/workflows/deploy.yml`**
  ```yaml
  # Trigger on push to main
  # Job 1: validate JSON in {{DOCS_OUTPUT_DIR}}/os/data/seed/
  # Job 2: deploy to GitHub Pages (actions/configure-pages + upload-pages-artifact)
  # permissions: pages: write, id-token: write
  # No build step - static files only
  ```

  **`deploy.sh`** (chmod +x)
  - Check Python 3 or npx serve available
  - `cd {{DOCS_OUTPUT_DIR}} && python -m http.server 8080` (or npx serve)
  - Print URL http://localhost:8080
  - Print one-time `gh` Pages enable instructions

  **`deploy.bat`**
  - Same for Windows; `start http://localhost:8080`

  **`README.md`**
  - What Project OS is
  - Feature list (dashboard, Gantt, WBS, team, docs, etc.)
  - Quick start: clone → `./deploy.sh` → open browser
  - Push-to-deploy: enable GitHub Pages from Actions
  - Cloudflare Pages alt setup (build command: none, output: {{DOCS_OUTPUT_DIR}})
  - Data model: seed JSON vs IndexedDB local edits
  - Export/backup workflow
  - How to copy `os/` to another project
  - Plugin development guide

  ## Phase 6 - Validation
  - [ ] `index.html` loads; no module import errors in console
  - [ ] Every sidebar module mounts and unmounts cleanly
  - [ ] Gantt SVG renders with ≥3 tasks from seed
  - [ ] WBS tree has ≥2 levels
  - [ ] Task kanban drag updates IndexedDB (verify via reload)
  - [ ] Theme toggle persists
  - [ ] documents module opens chapter pages
  - [ ] graph-viewer still works standalone
  - [ ] All seed JSON valid (CI workflow would pass)
  - [ ] `deploy.sh` / `deploy.bat` instructions are accurate
  - [ ] Relative paths work with `base_path: "{{BASE_PATH}}"`
  - [ ] No hardcoded "{{PROJECT_TITLE}}" in os/core/ (only in config/seed)
  - [ ] README explains push → auto-deploy flow

  # Plugin module template (every module must follow)

  ```javascript
  // os/modules/example/module.js
  export const id = 'example';
  export const label = 'Example';
  export const icon = 'grid';

  export async function mount(container, { store, config, events, utils }) {
    container.innerHTML = `<section class="module-page"><h1>${label}</h1><div id="example-root"></div></section>`;
    const data = await store.getAll('example_store');
    // render UI, bind events, persist via store.put()
  }

  export function unmount(container) {
    container.innerHTML = '';
  }
  ```

  # SVG Gantt requirements
  - Renderer class `SvgGantt` in `os/assets/charts/svg-gantt.js`
  - Constructor accepts `{ tasks, config, onTaskChange }`
  - Methods: `render(container)`, `setZoom(level)`, `exportSvg()`
  - Mouse: drag bar to shift dates; resize handles on bar ends
  - Dependencies: SVG `<path>` with arrow marker
  - Must work without internet after first load

  # Data persistence rules
  | Layer            | Purpose                                      | Git tracked |
  |------------------|----------------------------------------------|-------------|
  | os/data/seed/    | Default project data shipped with deploy     | Yes         |
  | IndexedDB        | User edits (tasks moved, risks added)        | No          |
  | localStorage     | UI prefs only                                | No          |
  | general/Project.json | Codebase-aligned manifest               | Yes         |

  Users export IndexedDB → JSON via Settings to commit team updates if desired.

  # Documentation quality (unchanged standards)
  - Codebase-aligned API/DB/test claims
  - Formal capstone tone in chapter HTML
  - Chapter II must follow `outline_alignment` (docs/Outline-Alignment.docx):
    System Planning → System Analysis → System Design → System Testing and Implementation → System Maintenance
  - Technologies section: each tool as `.tech-card` - heading, icon/screenshot, explanatory paragraph
  - System Testing: `.tables-results-syst-test` table with Accuracy, Recall, Precision, F1-Score + SVG charts
  - System Maintenance: future tense throughout; one generalized intro paragraph before each plan subsection
  - Tables for requirements, traceability, test results
  - status-pass / status-warn / status-fail classes
  - Cross-linked nav across chapters and architecture
  - System Planning page must embed or link Project OS team/WBS/Gantt data from seed JSON

  # Reusability contract
  To reuse in a future project, only replace:
  - `variables` / seed JSON / `general/Project.json`
  - `os/config/project.json`
  - Documentation HTML content
  Keep `os/core/`, `os/assets/charts/`, deployment workflow identical.

  # Scalability
  - New PM module → add `os/modules/<name>/module.js` + seed JSON + config entry
  - New doc chapter → add `chapterN/` + row in `documents-index.json`
  - New diagram → add `architecture/graphs/<id>.json` + manifest entry
  - New testing pack → add `testing/testing(<NAME>)/` + testing module link

  Begin with Phase 0 (Project OS core), then Phase 1 (modules), then documentation,
  then deployment files. Deliver a working static site openable via `./deploy.sh`.

# -----------------------------------------------------------------------------
# DEPLOYMENT FILE TEMPLATES (agent must expand with project values)
# -----------------------------------------------------------------------------
deployment_templates:
  github_workflow_outline: |
    name: Deploy Project OS
    on:
      push:
        branches: [main]
      workflow_dispatch:
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    jobs:
      validate:
        runs-on: ubuntu-latest
        steps:
          - uses: actions/checkout@v4
          - name: Validate seed JSON
            run: |
              for f in {{DOCS_OUTPUT_DIR}}/os/data/seed/*.json; do
                python -m json.tool "$f" > /dev/null
              done
      deploy:
        needs: validate
        runs-on: ubuntu-latest
        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }}
        steps:
          - uses: actions/checkout@v4
          - uses: actions/configure-pages@v4
          - uses: actions/upload-pages-artifact@v3
            with:
              path: '{{DOCS_OUTPUT_DIR}}'
          - id: deployment
            uses: actions/deploy-pages@v4

  deploy_sh_outline: |
    #!/usr/bin/env bash
    set -euo pipefail
    ROOT="$(cd "$(dirname "$0")" && pwd)"
    DOCS="{{DOCS_OUTPUT_DIR}}"
    PORT="${PORT:-8080}"
    echo "Serving Project OS from $ROOT/$DOCS at http://localhost:$PORT"
    cd "$ROOT/$DOCS"
    if command -v python3 &>/dev/null; then
      exec python3 -m http.server "$PORT"
    elif command -v python &>/dev/null; then
      exec python -m http.server "$PORT"
    elif command -v npx &>/dev/null; then
      exec npx --yes serve -l "$PORT"
    else
      echo "Install Python 3 or Node.js (npx serve)." >&2
      exit 1
    fi

# -----------------------------------------------------------------------------
# EXAMPLES & INVOCATION
# -----------------------------------------------------------------------------
example_filled_variables:
  PROJECT_TITLE: PigHealth
  PROJECT_SLUG: pighealth
  PROJECT_FULL_TITLE: "PigHealth: A Computer Vision and GIS-Based Pig Disease Detection and Farm Monitoring"
  DOCS_OUTPUT_DIR: docs
  BASE_PATH: "/Capstone-Project"
  DOC_VERSION: "June 2026 · codebase-aligned"
  DATE_TARGET: "2026-03-15"
  ARCH_PATTERN: "Three-Tier Distributed (Laravel + FastAPI ML + Dual Clients)"

cursor_invocation: |
  Read `docs/templates/generate-documentation.prompt.yaml` v2. Fill variables for [PROJECT NAME].
  Scan this repository and generate the complete Project OS + documentation per `agent_prompt`.
  Priority: master shell (index.html + os/) with working dashboard, Gantt SVG, WBS tree, team,
  tasks, milestones, risks - then capstone docs - then .github/workflows/deploy.yml, deploy.sh,
  deploy.bat, README.md. Static only. ES6 modules. No backend. Push-to-deploy ready.
