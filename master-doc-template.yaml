# =============================================================================
# PROJECT OS + DOCUMENTATION GENERATOR - PROMPT TEMPLATE v2
# =============================================================================
# File type : YAML (structured, reusable, machine-parseable AI prompt)
# Version   : 2.0.0
# Purpose   : Generate a self-contained static "Project OS" that bundles:
#             • Capstone / technical documentation (HTML chapters, architecture)
#             • Project management (dashboard, Gantt, WBS, team, tasks, risks)
#             • Zero-backend dynamics via JSON seeds + localStorage + IndexedDB
#             • Push-to-deploy static hosting (GitHub Pages, Cloudflare, etc.)
#
# Usage:
#   1. Copy → rename (e.g. myapp-project-os.prompt.yaml)
#   2. Fill `variables` (search {{PLACEHOLDER}})
#   3. Paste rendered `agent_prompt` into Cursor / Claude / ChatGPT
#   4. Agent scans repo → generates {{DOCS_OUTPUT_DIR}}/ + deployment files
#
# Design goal: clone repo → push → live site updates. No servers. No databases.
# =============================================================================

schema_version: "2.0.0"
kind: project-os-documentation-generator
output_root: "{{DOCS_OUTPUT_DIR}}"

# -----------------------------------------------------------------------------
# TECHNOLOGY STACK (mandatory - do not substitute frameworks)
# -----------------------------------------------------------------------------
technology_stack:
  frontend:
    - HTML5
    - CSS3
    - "Vanilla JavaScript (ES6 Modules)"
  storage:
    committed_seed: "JSON files under os/data/seed/ (version-controlled truth)"
    runtime_cache: localStorage
    structured_data: IndexedDB
    rule: "Never require a backend API. All reads/writes stay client-side."
  visualization:
    - "SVG-based charts (progress, burndown, status donuts)"
    - "SVG-based Gantt rendering (custom renderer, no paid libs required)"
    - "Optional: Mermaid for sequence/flow (CDN, graceful offline fallback)"
  deployment:
    primary: [GitHub Pages, Cloudflare Pages]
    also_supported: [Netlify, Vercel]
  cicd:
    - GitHub Actions
  configuration:
    - JSON
  architecture:
    - Static Site Architecture
    - Plugin-Based Module System

# -----------------------------------------------------------------------------
# VARIABLES - customize per project
# -----------------------------------------------------------------------------
variables:
  project:
    title: "{{PROJECT_TITLE}}"
    full_title: "{{PROJECT_FULL_TITLE}}"
    slug: "{{PROJECT_SLUG}}"                      # kebab-case, used in storage keys
    type: "{{PROJECT_TYPE}}"
    date_started: "{{DATE_STARTED}}"
    date_target: "{{DATE_TARGET}}"                  # e.g. 2026-03 defense date
    version_label: "{{DOC_VERSION}}"

  institution:
    name: "{{INSTITUTION_NAME}}"
    department: "{{DEPARTMENT}}"
    location: "{{LOCATION}}"

  team:
    - name: "{{TEAM_MEMBER_1}}"
      role: "{{ROLE_1}}"                          # e.g. Project Lead / Backend
      email: "{{EMAIL_1}}"
    - name: "{{TEAM_MEMBER_2}}"
      role: "{{ROLE_2}}"
      email: "{{EMAIL_2}}"
    - name: "{{TEAM_MEMBER_3}}"
      role: "{{ROLE_3}}"
      email: "{{EMAIL_3}}"

  advisor:
    name: "{{ADVISOR_NAME}}"
    title: "{{ADVISOR_TITLE}}"

  vision:
    problem_statement: "{{PROBLEM_STATEMENT}}"
    solution: "{{SOLUTION_SUMMARY}}"
    core_goal: "{{CORE_GOAL}}"

  repository:
    root: "{{REPO_ROOT}}"
    components:
      - path: "{{COMPONENT_1_PATH}}"
        role: "{{COMPONENT_1_ROLE}}"
        stack: "{{COMPONENT_1_STACK}}"
      - path: "{{COMPONENT_2_PATH}}"
        role: "{{COMPONENT_2_ROLE}}"
        stack: "{{COMPONENT_2_STACK}}"
      - path: "{{COMPONENT_3_PATH}}"
        role: "{{COMPONENT_3_ROLE}}"
        stack: "{{COMPONENT_3_STACK}}"

  deployment:
    site_name: "{{PROJECT_TITLE}} Project OS"
    publish_directory: "{{DOCS_OUTPUT_DIR}}"      # folder GitHub Pages serves
    base_path: "{{BASE_PATH}}"                    # "" for user.github.io/repo OR "/repo" for project pages
    default_branch: main
  #   hosting_target: github-pages | cloudflare-pages | netlify | vercel

  project_os:
    enabled: true
    modules:
      # enabled: true|false per module; order = sidebar order
      - id: dashboard
        label: Dashboard
        icon: grid
        enabled: true
      - id: tasks
        label: Tasks
        icon: check-square
        enabled: true
      - id: gantt
        label: Gantt Chart
        icon: timeline
        enabled: true
      - id: wbs
        label: WBS
        icon: tree
        enabled: true
      - id: team
        label: Team
        icon: users
        enabled: true
      - id: milestones
        label: Milestones
        icon: flag
        enabled: true
      - id: risks
        label: Risks & Issues
        icon: alert
        enabled: true
      - id: documents
        label: Documentation
        icon: book
        enabled: true
      - id: architecture
        label: Architecture
        icon: layers
        enabled: true
      - id: testing
        label: Testing
        icon: flask
        enabled: true
      - id: reports
        label: Reports
        icon: file-text
        enabled: true
      - id: settings
        label: Settings
        icon: gear
        enabled: true

  manuscript:
    chapters:
      - id: chapter1
        enabled: true
        title: "Chapter I - Introduction"
        slug: chapter1
        pages:
          - { file: 01-introduction.html, title: Introduction }
      - id: chapter2
        enabled: true
        title: "Chapter II - Methodology"
        slug: chapter2
        outline_source: "docs/Outline-Alignment.docx"
        pages:
          - { file: index.html, title: Chapter II Index, kind: index }
          - { file: 01-system-planning.html, title: System Planning, part: "Part A" }
          - { file: 02-system-analysis.html, title: System Analysis, part: "Part B" }
          - { file: 03-system-design.html, title: System Design, part: "Part C" }
          - { file: 04-system-testing.html, title: System Testing and Implementation, part: "Part D" }
          - { file: 05-system-maintenance.html, title: System Maintenance, part: "Part E" }

  architecture:
    pattern: "{{ARCH_PATTERN}}"
    pages:
      - 01-high-level-architecture.html
      - 02-system-components.html
      - 03-communication-protocols.html
      - 04-database-design.html
      - 05-ai-pipeline.html
      - 06-deployment.html
      - 07-workflows-diagrams.html
    graphs:
      - { id: system-architecture, diagram_id: "Fig-2.1", format: directed_graph }
      - { id: backend-layers, diagram_id: "Fig-2.2", format: layered_graph }
      - { id: rest-api-catalog, diagram_id: "Fig-2.3", format: catalog }
      - { id: database-erd, diagram_id: "Fig-2.4", format: dbml, extension: dbml }
      - { id: deployment-topology, diagram_id: "Fig-2.5", format: directed_graph }
      - { id: frontend-component, diagram_id: "Fig-2.6", format: component_tree }
      - { id: ai-pipeline-component, diagram_id: "Fig-2.7", format: pipeline, optional: true }

  testing_packs:
    - { id: ieee, folder: "testing(IEEE)", enabled: true }
    - { id: utaut, folder: "testing(UTAUT)", enabled: false }

# -----------------------------------------------------------------------------
# INSTITUTIONAL OUTLINE ALIGNMENT (from docs/Outline-Alignment.docx)
# Maps capstone manuscript sections to generated HTML, diagrams, and Project OS modules.
# -----------------------------------------------------------------------------
outline_alignment:
  source_document: "docs/Outline-Alignment.docx"
  citation_style: IEEE

  chapter1_supplement:
    review_of_related_literature_and_works:
      description: |
        Critical analysis of existing studies and systems. Related Literature = scholarly
        sources aligned with objectives; Related Works = comparable systems.
      requirements:
        - "Minimum 16 resources (journals, papers, technical reports) not older than 10 years"
        - "Tabular comparison of related works: functionalities, algorithms, parameters, metrics"
        - "IEEE in-text citations throughout"
    definition_of_terms:
      description: |
        Operational and technical terms used in the project; alphabetically ordered;
        each definition explains application within the system (with citation).

  chapter2_methodology:
    title: "Chapter II - Methodology"
    introduction: |
      Methodology is the systematic approach, techniques, and processes used to carry out
      the study and develop the system. Briefly justify the chosen software process model
      (e.g. Agile, Waterfall, Scrum, Spiral, V-Model, Iterative, RAD, DevOps, XP, Prototype).
    software_process_models_reference:
      - Agile
      - Waterfall
      - Scrum
      - Kanban
      - Spiral Model
      - "V-Model (Verification and Validation Model)"
      - Iterative Model
      - Incremental Model
      - Rapid Application Development (RAD)
      - DevOps
      - Lean Software Development
      - Extreme Programming (XP)
      - Prototype Model
      - Big Bang Model

    sections:
      - id: system_planning
        title: System Planning
        html_page: chapter2/01-system-planning.html
        part: "Part A"
        description: Planning phase and project conception.
        project_os_links:
          - { module: team, subsection: "Project Team Organization" }
          - { module: wbs, subsection: "Work Breakdown Structure" }
          - { module: gantt, subsection: "Gantt Chart" }
        subsections:
          - id: project_team_organization
            title: Project Team Organization
            requirements:
              - "Organizational chart showing team composition"
              - "Include member photos and adviser at top of hierarchy"
            deliverables:
              - "Org chart figure (SVG or embedded image)"
              - "Table of roles and responsibilities"
              - "Link to Project OS Team module (#/team) and seed team.json"
          - id: work_breakdown_structure
            title: Work Breakdown Structure
            requirements:
              - "Phase-based breakdown of all activities"
              - "Preferably aligned with PADIM stages (Planning, Analysis, Design, Implementation, Maintenance)"
            deliverables:
              - "WBS outline table in HTML"
              - "Link to Project OS WBS module (#/wbs) seeded from wbs.json"
          - id: gantt_chart
            title: Gantt Chart
            requirements:
              - "Schedule derived from WBS tasks"
              - "Month and year axis formatting"
            deliverables:
              - "Embedded SVG Gantt snapshot or link to Project OS Gantt (#/gantt)"
              - "Milestone markers for defense dates"

      - id: system_analysis
        title: System Analysis
        html_page: chapter2/02-system-analysis.html
        part: "Part B"
        subsections:
          - id: system_architecture
            title: System Architecture
            requirements:
              - "Conceptual framework: hardware, software, data, users, interactions"
              - "Supported with diagrams"
            optional_variants:
              - Conceptual framework
              - "Prototype (with IoT or Infrastructure)"
              - "Floor Plan (Physical Layout Design)"
            deliverables:
              - { figure_id: "Fig-2.1", file: "architecture/graphs/system-architecture.json", title: "Conceptual System Architecture" }
              - "Component table (layer, technology, interaction)"
          - id: requirements
            title: Functional and Non-Functional Requirements
            requirements:
              - "Brief discussion plus numbered lists"
              - "Functional = expected behaviors; Non-functional = quality attributes"
            deliverables:
              - "FR-NNN and NFR-NNN numbered requirement tables"
              - "Traceability hooks to testing module and IEEE pack"
          - id: use_case_diagram
            title: Use Case Diagram
            requirements:
              - "Actors and their interactions with the system"
            deliverables:
              - { figure_id: "Fig-2.2", file: "chapter2/graphs/use-case.json", format: use_case }
          - id: dfd_level0
            title: Context Flow Diagram (Level 0 DFD)
            requirements:
              - "Business actions and data flow with external entities"
              - "Physical DFD optional for game-development projects"
            deliverables:
              - { figure_id: "Fig-2.3", file: "chapter2/graphs/dfd-level0.json", format: dfd_level0 }
          - id: dfd_level1
            title: Level 1 DFD
            requirements:
              - "Expands Level 0: modules, subprocesses, detailed data flows"
              - "Gane and Sarson notation for logical diagrams"
            deliverables:
              - { figure_id: "Fig-2.4", file: "chapter2/graphs/dfd-level1.json", format: dfd_level1 }

      - id: system_design
        title: System Design
        html_page: chapter2/03-system-design.html
        part: "Part C"
        subsections:
          - id: erd
            title: Entity Relationship Diagram
            requirements:
              - "Database entities and relationships"
              - "Omit if using NoSQL-only persistence"
            deliverables:
              - { figure_id: "Fig-2.5", file: "architecture/graphs/database-erd.dbml", format: dbml }
              - "Link to architecture/04-database-design.html"
          - id: json_schema
            title: JSON Schema Diagram
            requirements:
              - "Structure of JSON documents for validation and automated testing"
              - "Omit for SQL-only relational databases"
            deliverables:
              - "Note omission with rationale when SQL-based (Django ORM / PostgreSQL)"
              - "Optional: API request/response schema from backend/API_structure.json"
          - id: data_dictionary
            title: Data Dictionary
            requirements:
              - "Table of all tables, fields, types, constraints, descriptions"
            deliverables:
              - "Generated from database/database_schema.json or migrations scan"
          - id: technologies_concepts_theories
            title: Technologies, Concepts, and Theories
            requirements:
              - "Models, algorithms, frameworks, and tools used in the system"
              - "Data lifecycle discussion where applicable"
              - "One entry per technology/concept/theory using the card format below"
            entry_format:
              pattern: |
                Repeat for each item (VS Code, Django, React, PostgreSQL, MediaPipe, etc.):
                  1. Heading - technology or concept name (h3)
                  2. Visual - logo icon or screenshot (<img> in chapter2/assets/tech/)
                  3. Body - paragraph(s) explaining role in the project, version, and rationale
              html_structure: |
                <article class="tech-card">
                  <h3>VS Code</h3>
                  <figure class="tech-visual">
                    <img src="assets/tech/vscode.png" alt="Visual Studio Code logo" width="64" height="64" />
                  </figure>
                  <p>VS Code will serve as the primary integrated development environment …</p>
                </article>
              css_class: tech-card
              assets_folder: "{{DOCS_OUTPUT_DIR}}/chapter2/assets/tech/"
              scan_sources:
                - "package.json, requirements.txt, pyproject.toml"
                - "README and architecture docs"
                - "backend/ and frontend/ stack manifests"
            data_lifecycle_topics:
              type_of_data: [primary, secondary]
              data_sources:
                - "User inputs (forms, transactions)"
                - "System-generated data (logs, records)"
                - "External sources (APIs, datasets)"
                - "IoT devices (if applicable)"
              data_collection_method: [manual_input, automated_collection]
              time_of_collection: [real_time, periodic, one_time]
              dataset_overview: [record_counts, expected_growth]
              data_structure: [key_fields, grouped_categories]
              processing_stages:
                - Data Cleaning
                - Data Transformation
                - Data Integration
                - Data Reduction
                - Data Validation

      - id: system_testing
        title: System Testing and Implementation
        html_page: chapter2/04-system-testing.html
        part: "Part D"
        subsections:
          - id: testing_results
            title: Testing Results
            requirements:
              - "Define fields/columns used to determine a successful result"
              - "State confidence level for findings"
              - "Layered strategy: unit/API, integration, WebSocket, AI pipeline, UAT"
              - "Include classification performance metrics for AI/ML components where applicable"
            classification_metrics_table:
              tag: tables-results-syst-test
              css_class: tables-results-syst-test
              caption: "Table - System Testing Results (Classification Metrics)"
              required_metrics:
                - Accuracy
                - Recall
                - Precision
                - F1-Score
              columns: [Metric, Value, Target, Interpretation, Status]
              notes: |
                Populate from real evaluation runs (confusion matrix, held-out frames, or
                labeled test set). Do not fabricate values - cite dataset size and method.
              charts:
                - id: classification-metrics-bar
                  title: "Fig-2.6 - Classification Metrics (Accuracy, Recall, Precision, F1-Score)"
                  type: grouped_bar
                  metrics: [Accuracy, Recall, Precision, F1-Score]
                  renderer: "os/assets/charts/svg-charts.js or inline SVG in chapter2/assets/"
                  data_source: classification_metrics_table
                - id: classification-metrics-comparison
                  title: "Fig-2.7 - Per-Class or Per-Scenario F1 Comparison (optional)"
                  type: bar
                  optional: true
            deliverables:
              - "Tagged results table (.tables-results-syst-test): metric, expected, actual, pass/fail"
              - "Classification metrics table: Accuracy, Recall, Precision, F1-Score"
              - "SVG bar chart(s) visualizing the four classification metrics"
              - "Link to testing/testing(IEEE)/ and automated test suite counts from repo"
              - "Link to Project OS Testing module (#/testing)"
          - id: summary_of_findings
            title: Summary of Findings
            requirements:
              - "Tabular summary of defects, coverage, open risks, and metric interpretation"
            deliverables:
              - "Findings table with severity, module, resolution status"
              - "Brief narrative on whether Accuracy / Recall / Precision / F1 meet targets"

      - id: system_maintenance
        title: System Maintenance
        html_page: chapter2/05-system-maintenance.html
        part: "Part E"
        tense: future
        voice: |
          Entire section written in future tense - e.g. "will be implemented", "shall be
          performed", "will ensure", "plans to deploy". Describes post-deployment sustainment.
        subsections:
          - id: systems_security_plan
            title: Systems Security Plan
            intro_paragraph: |
              One generalized opening paragraph (future tense) stating that the system will
              adopt a defense-in-depth security posture across authentication, transport,
              application, and data layers to protect examinee privacy, exam integrity, and
              institutional data throughout the operational lifecycle.
            requirements:
              - "Preventive, detective, and corrective controls across auth, transport, app, data"
              - "Future-tense phrasing for all planned controls and maintenance actions"
            deliverables:
              - "Generalized intro paragraph (future tense) before detail tables"
              - "Control tables: layer, threat, mitigation, maintenance action"
          - id: systems_maintenance_plan
            title: Systems Maintenance Plan
            intro_paragraph: |
              One generalized opening paragraph (future tense) stating that ongoing
              corrective, adaptive, perfective, and preventive maintenance will be carried
              out to preserve availability, incorporate security patches, and evolve the
              platform in response to user feedback and institutional policy changes.
            requirements:
              - "Corrective, adaptive, perfective, preventive maintenance schedule"
              - "Future-tense phrasing for all scheduled activities"
            deliverables:
              - "Generalized intro paragraph (future tense) before detail tables"
              - "Maintenance activity table with frequency, owner, tooling"

  chapter2_graphs:
    folder: "{{DOCS_OUTPUT_DIR}}/chapter2/graphs/"
    viewer: "{{DOCS_OUTPUT_DIR}}/architecture/graph-viewer.html"
    files:
      - { id: use-case, diagram_id: "Fig-2.2", file: use-case.json, section: system_analysis }
      - { id: dfd-level0, diagram_id: "Fig-2.3", file: dfd-level0.json, section: system_analysis }
      - { id: dfd-level1, diagram_id: "Fig-2.4", file: dfd-level1.json, section: system_analysis }
    testing_charts:
      - { id: classification-metrics-bar, diagram_id: "Fig-2.6", section: system_testing, metrics: [Accuracy, Recall, Precision, F1-Score] }
      - { id: classification-metrics-comparison, diagram_id: "Fig-2.7", section: system_testing, optional: true }

# -----------------------------------------------------------------------------
# PROJECT OS - ARCHITECTURE SPEC (reusable across all future projects)
# -----------------------------------------------------------------------------
project_os_spec:
  concept: |
    A single static master shell (SPA) that acts as the project's operating system.
    Documentation pages, diagrams, and PM tools are plugins loaded into one layout.
    Committed JSON seeds provide the default state; IndexedDB holds user edits;
    localStorage holds UI preferences. Push to main → CI deploys → site updates.

  entry_points:
    primary: "{{DOCS_OUTPUT_DIR}}/index.html"     # Master shell (Project OS)
    legacy_hub: "{{DOCS_OUTPUT_DIR}}/hub.html"    # Optional flat link index fallback

  shell_layout:
    regions:
      - id: sidebar
        contains: [project_logo, module_nav, doc_quick_links, theme_toggle]
      - id: topbar
        contains: [breadcrumb, search, sync_status, export_actions]
      - id: main
        contains: [module_viewport]                # dynamic plugin mount point
      - id: footer
        contains: [version, last_sync, deploy_info]

  routing:
    strategy: "hash-router"                       # #/dashboard, #/gantt, #/documents/chapter2
    fallback: "dashboard"
    deep_linking: true
    module_pattern: "#/module/{moduleId}"
    document_pattern: "#/documents/{section}/{page}"

  plugin_contract:
    required_exports:
      - id: string                                # matches modules[].id
      - label: string
      - icon: string                              # SVG sprite name
      - mount: "async (container, context) => void"
      - unmount: "optional (container) => void"
    context_injected:
      - store                                     # DataStore instance
      - router
      - config                                    # os/config/project.json
      - events                                    # pub/sub bus
      - utils                                     # dates, ids, csv export

  data_layer:
    seed_files:                                   # committed, deployed with site
      - os/data/seed/project.json
      - os/data/seed/team.json
      - os/data/seed/tasks.json
      - os/data/seed/wbs.json
      - os/data/seed/gantt.json
      - os/data/seed/milestones.json
      - os/data/seed/risks.json
      - os/data/seed/documents-index.json
    indexeddb:
      database_name: "{{PROJECT_SLUG}}-project-os"
      version: 1
      stores: [tasks, wbs_nodes, gantt_tasks, milestones, risks, team_overrides, activity_log]
    localStorage_keys:
      - "{{PROJECT_SLUG}}:theme"
      - "{{PROJECT_SLUG}}:sidebar_collapsed"
      - "{{PROJECT_SLUG}}:last_route"
      - "{{PROJECT_SLUG}}:seed_version"
    sync_strategy: |
      On first load: if IndexedDB empty → import all seed JSON.
      On subsequent loads: compare seed manifest version in project.json;
        if seed version bumped → merge non-destructively (keep user edits, add new seed rows).
      Settings module: "Reset to seed" and "Export all data as JSON" actions.
      Show sync badge: "Synced from repo" vs "Local changes (not in git until export)".

  module_specifications:
    dashboard:
      widgets:
        - project_health_score                      # computed from tasks/milestones/risks
        - milestone_countdown                       # days to {{DATE_TARGET}}
        - task_summary                              # todo / in-progress / done counts
        - team_workload_chart                       # SVG bar chart per member
        - recent_activity_feed
        - implementation_status                     # from general/Project.json
        - quick_links                               # defense docs, repo, live demo
      data_sources: [tasks.json, milestones.json, team.json, general/Project.json]

    tasks:
      features:
        - kanban_columns: [backlog, todo, in_progress, review, done]
        - fields: [id, title, description, assignee, priority, status, due_date, tags, wbs_ref]
        - filter_by_assignee, filter_by_sprint, filter_by_priority
        - drag_drop_status_change                   # persists to IndexedDB
        - bulk_import_from_wbs
      id_pattern: "TASK-{{NNN}}"

    gantt:
      features:
        - svg_timeline_renderer                     # NO external Gantt SaaS
        - zoom: [week, month, quarter]
        - drag_resize_tasks                         # updates start/end in IndexedDB
        - dependency_arrows                         # finish-to-start links
        - milestone_diamonds
        - today_line
        - export_svg, export_png_via_canvas
      renderer_requirements: |
        Pure SVG + vanilla JS. ViewBox scaling for responsive layout.
        Row height 32px, bar radius 4px, dependency lines with arrow markers.
        Color bars by status or assignee. Tooltip on hover with dates.

    wbs:
      features:
        - hierarchical_tree                         # expandable nodes
        - fields: [id, code, title, parent_id, level, owner, status, deliverable]
        - drag_reparent                             # updates tree in IndexedDB
        - roll_up_progress                          # % from child tasks
        - export_outline_text, export_json
      id_pattern: "WBS-{{N.N.N}}"

    team:
      features:
        - member_cards_with_roles
        - responsibility_matrix                     # RACI-lite: R/A/C/I per WBS area
        - contact_links
        - workload_from_tasks
        - advisor_panel
      seed_from: variables.team + variables.advisor

    milestones:
      features:
        - institutional_milestones                    # title defense, pre-oral, final defense
        - technical_milestones                        # MVP, integration, UAT, deploy
        - status: [upcoming, at_risk, completed, missed]
        - countdown_and_overdue_highlight

    risks:
      features:
        - risk_register_table
        - fields: [id, title, category, probability, impact, score, mitigation, owner, status]
        - heat_map_svg                                # probability × impact grid
        - link_to_tasks

    documents:
      features:
        - embedded_navigator_for_all_static_html
        - renders manuscript chapters in iframe OR fetches and inlines content
        - full_text_search_across_json_manifest       # client-side index built at load
        - links_to_general_Project.json
        - chapter2_methodology_toc                    # Part A–E from outline_alignment
        - cross_link_planning_to_pm_modules             # team, wbs, gantt from System Planning page

    architecture:
      features:
        - embed_graph_viewer_module
        - diagram_gallery_from_graph_manifest
        - link_to_architecture_html_pages

    testing:
      features:
        - ieee_test_case_summary_table
        - traceability_matrix_view
        - link_to_chapter2_04_and_testing_packs         # chapter2/04-system-testing.html

    reports:
      features:
        - generate_status_report_preview              # HTML snapshot in new window
        - export_project_summary_json
        - export_gantt_svg
        - export_wbs_outline
