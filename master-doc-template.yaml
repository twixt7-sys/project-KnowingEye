# -----------------------------------------------------------------------------
# DEPLOYMENT REQUIREMENTS
# -----------------------------------------------------------------------------
deployment_requirements:
  principle: |
    save file → git push → website updates automatically.
    Zero manual deploy steps after one-time hosting setup.
    Entire application is a static site. No backend. No database server.

  supported_targets:
  #   github-pages:
  #     config: publish from /docs folder OR GitHub Actions artifact
  #     base_path: "/{{REPO_NAME}}" for project pages
  #   cloudflare-pages:
  #     config: build command = none; output = {{DOCS_OUTPUT_DIR}}
  #   netlify:
  #     config: publish dir = {{DOCS_OUTPUT_DIR}}; no build
  #   vercel:
  #     config: static output; vercel.json routes SPA fallback to index.html

  files_to_generate:
    github_workflow:
      path: .github/workflows/deploy.yml
      triggers: [push main, workflow_dispatch]
      jobs:
        - validate_json_seed_files
        - optional_lint_html
        - deploy_github_pages
      permissions: { contents: read, pages: write, id-token: write }

    deploy_sh:
      path: deploy.sh
      actions:
        - print_prerequisites
        - serve_locally_python_or_npx                              # python -m http.server
        - optional_gh_pages_deploy_instructions
        - chmod_plus_x_self

    deploy_bat:
      path: deploy.bat
      actions:
        - serve_locally_python_or_npx
        - open_browser_localhost
        - print_gh_pages_instructions

    readme_sections:
      - Project overview
      - Project OS features (dashboard, Gantt, WBS, team, etc.)
      - Local development (./deploy.sh or deploy.bat)
      - One-time GitHub Pages setup
      - Cloudflare Pages setup (alternative)
      - Data model (seed JSON vs IndexedDB edits)
      - How to export/back up local changes
      - Folder structure
      - Adding a new plugin module
      - Documentation sections (chapters, architecture)
      - License / team credits

  spa_fallback:
    rule: |
      For hash-router, no server rewrite is strictly required.
      For History API mode (optional), provide _redirects (Netlify) or vercel.json rewrite.
      Default to hash-router to maximize host compatibility.

  post_deploy_verification:
    - index.html loads without console errors
    - all enabled modules mount via sidebar click
    - seed JSON fetch succeeds (relative paths work with base_path)
    - Gantt SVG renders at least one bar
    - WBS tree expands
    - documents module opens chapter1
    - theme toggle persists after reload

