# Knowing Eye pipeline playground configuration
# Mirrors planned main-system ai/ module settings

pipeline:
  # Target FPS for real-time webcam (analysis may skip frames)
  target_fps: 5
  # Alert when any compliance metric falls below this % (0–100)
  alert_threshold_pct: 80
  # Identity match threshold (lower = stricter)
  # ArcFace: cosine distance (~0.42 typical). face_recognition: L2 (~0.6).
  identity_match_threshold: 0.42

detection:
  # mediapipe | yolo (face uses mediapipe; yolo adds object/phone detection)
  face_backend: mediapipe
  pose_backend: mediapipe
  yolo_model: yolov8n.pt
  yolo_confidence: 0.45
  # COCO class IDs: 0=person, 67=cell phone
  yolo_target_classes: [0, 67]

recognition:
  # arcface | face_recognition | appearance (auto-fallback when deps missing)
  embedding_backend: arcface
  arcface_model: buffalo_l
  # Head pose / gaze thresholds (degrees)
  gaze_yaw_threshold_deg: 25
  gaze_pitch_threshold_deg: 20
  # Posture: max shoulder tilt ratio (0–1)
  posture_shoulder_tilt_max: 0.12
  posture_spine_lean_max: 0.55
  # Seconds without a face before no_face event
  no_face_grace_seconds: 2.0

behavior:
  # Seconds with face visible but no upper-body keypoints before leaving_seat
  leaving_seat_grace_seconds: 3.0
  suspicious_pattern:
    window_seconds: 60
    min_flags: 3
    cooldown_seconds: 120
  metric_weights:
    face: 0.25
    gaze: 0.25
    posture: 0.2
    identity: 0.15
    object: 0.15
  weights:
    no_face: 1.0
    multiple_faces: 0.9
    looking_away: 0.7
    bad_posture: 0.6
    leaving_seat: 0.75
    object_detected: 0.85
    identity_mismatch: 0.95
    suspicious_pattern: 0.9
  alert_severity:
    no_face: high
    multiple_faces: high
    looking_away: medium
    bad_posture: low
    leaving_seat: medium
    object_detected: high
    identity_mismatch: high
    suspicious_pattern: high

paths:
  reference_faces_dir: data/reference_faces
  sessions_output_dir: data/sessions
  training_data_dir: training/data
