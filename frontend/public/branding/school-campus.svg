  <text x="1120" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="72" font-weight="700" fill="#166534">LCC</text>
  <rect x="1320" y="450" width="260" height="230" rx="8" fill="#f8fffa" opacity="0.88"/>
  <rect x="1580" y="480" width="220" height="200" rx="8" fill="#f8fffa" opacity="0.85"/>
  <!-- Trees -->
  <circle cx="120" cy="580" r="55" fill="#22c55e"/>
  <circle cx="1750" cy="560" r="70" fill="#16a34a"/>
  <circle cx="1680" cy="610" r="45" fill="#4ade80"/>
  <text x="960" y="180" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="42" font-weight="600" fill="#14532d" opacity="0.85">Campus Photo Placeholder</text>
  <text x="960" y="235" text-anchor="middle" font-family="system-ui, Segoe UI, sans-serif" font-size="22" fill="#166534" opacity="0.7">Replace with your school image at public/branding/school-campus.jpg</text>
