<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="1080" viewBox="0 0 1920 1080" role="img" aria-label="Campus photo placeholder">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#86efac"/>
      <stop offset="55%" stop-color="#dcfce7"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
    <linearGradient id="hill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#166534"/>
      <stop offset="100%" stop-color="#14532d"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"/>
  <ellipse cx="960" cy="920" rx="1100" ry="280" fill="url(#hill)" opacity="0.35"/>
  <rect x="0" y="620" width="1920" height="460" fill="#166534" opacity="0.55"/>
  <!-- Building silhouettes -->
  <rect x="180" y="420" width="280" height="260" rx="8" fill="#f8fffa" opacity="0.92"/>
  <rect x="220" y="460" width="50" height="70" fill="#166534" opacity="0.25"/>
  <rect x="290" y="460" width="50" height="70" fill="#166534" opacity="0.25"/>
  <rect x="360" y="460" width="50" height="70" fill="#166534" opacity="0.25"/>
  <polygon points="320,420 460,320 600,420" fill="#14532d"/>
  <rect x="520" y="380" width="340" height="300" rx="8" fill="#f8fffa" opacity="0.95"/>
  <rect x="560" y="430" width="60" height="80" fill="#1d4ed8" opacity="0.18"/>
  <rect x="650" y="430" width="60" height="80" fill="#166534" opacity="0.2"/>
  <rect x="740" y="430" width="60" height="80" fill="#eab308" opacity="0.22"/>
