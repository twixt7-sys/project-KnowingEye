<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Knowing Eye - Graph Viewer</title>
  <script src="assets/theme.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/styles.css" />
  <script src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
  <script src="assets/graph-manifest.js"></script>
  <style>
    .page { max-width: 1400px; }
    @media print {
      .diagram-nav, .viewer-toolbar { display: none; }
      .viewer-layout { grid-template-columns: 1fr; }
      #graph-canvas { border: 1px solid #ccc; min-height: auto; max-height: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <nav class="site-nav">
      <a href="index.html">Index</a>
      <a href="graph-viewer.html" class="active">Graph Viewer</a>
      <a href="07-workflows-diagrams.html">Diagram Sources</a>
    </nav>

    <header class="doc-header" style="margin-bottom: 1rem;">
      <p class="eyebrow">Interactive · graphs/*.json &amp; database-erd.dbml</p>
      <h1>Architecture Graph Viewer</h1>
      <p class="lead">Live visual rendering of all architecture diagram sources. Pan/zoom node graphs; sequence and flowcharts via Mermaid; ERD from DBML.</p>
    </header>

    <div class="viewer-layout">
      <aside class="diagram-nav">
        <h2>Diagrams</h2>
        <nav id="diagram-nav"></nav>
      </aside>

      <main class="viewer-main">
        <div class="viewer-toolbar">
          <button type="button" id="btn-fit" title="Fit network to view">Fit view</button>
          <button type="button" onclick="window.print()">Print figure</button>
          <a id="link-source" href="#">JSON / DBML source</a>
        </div>
        <h2 id="viewer-title">Loading…</h2>
        <p id="viewer-desc"></p>
        <p id="viewer-meta"></p>
        <div id="graph-canvas"></div>
      </main>
    </div>
  </div>

  <script src="assets/graph-viewer.js?v=4"></script>
</body>
</html>
